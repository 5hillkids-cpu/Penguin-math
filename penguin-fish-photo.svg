  <ellipse cx="740" cy="334" rx="42" ry="90" fill="#26384f" transform="rotate(18 740 334)"/>

  <circle cx="620" cy="176" r="104" fill="url(#body)"/>
  <ellipse cx="577" cy="182" rx="20" ry="28" fill="#f7fbff"/>
  <ellipse cx="663" cy="182" rx="20" ry="28" fill="#f7fbff"/>
  <circle cx="581" cy="188" r="9" fill="#112236"/>
