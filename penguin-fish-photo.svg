<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Photograph-style penguin holding a fish on ice">
  <defs>
    <radialGradient id="bgGlow" cx="56%" cy="45%" r="65%">
      <stop offset="0" stop-color="#f3fbff"/>
      <stop offset="1" stop-color="#b7d8ee"/>
    </radialGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf7ff"/>
      <stop offset="1" stop-color="#b7d5ea"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4f66"/>
      <stop offset="1" stop-color="#1d2c3f"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dceaf6"/>
    </linearGradient>
    <linearGradient id="fish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#72bfdc"/>
      <stop offset="1" stop-color="#3f89aa"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGlow)"/>
  <ellipse cx="615" cy="472" rx="250" ry="64" fill="#8fb8d0" opacity="0.38" filter="url(#softBlur)"/>
  <ellipse cx="615" cy="478" rx="238" ry="56" fill="url(#ice)" opacity="0.82"/>

  <ellipse cx="620" cy="325" rx="150" ry="185" fill="url(#body)"/>
