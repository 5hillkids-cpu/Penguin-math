  <circle cx="410" cy="337" r="5" fill="#f2fbff"/>
  <path d="M398 350 Q454 372 508 352" fill="none" stroke="#cbe9f7" stroke-width="4" opacity="0.7"/>

  <ellipse cx="640" cy="122" rx="42" ry="22" fill="#ffffff" opacity="0.2"/>
